<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Stackr — Crypto Portfolio Tracker">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0b" />
      <stop offset="100%" stop-color="#131316" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a2a30" stroke-width="1" opacity="0.3" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Decorative chart line — implies portfolio history -->
  <polyline
    points="60,540 180,510 300,490 420,440 520,360 620,300 720,295 820,280 940,265 1060,250 1160,238"
    fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.18"
  />
  <polyline
    points="60,540 180,510 300,490 420,440 520,360 620,300 720,295 820,280 940,265 1060,250 1160,238"
    fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.12"
  />

  <!-- Logo icon — centered, scale 6 -->
  <g transform="translate(518 95) scale(6)">
    <rect x="5" y="19" width="14" height="4" rx="1.2" fill="#1d4ed8" />
    <rect x="8" y="14" width="14" height="4" rx="1.2" fill="#2563eb" />
    <rect x="11" y="9" width="14" height="4" rx="1.2" fill="#3b82f6" />
  </g>

  <!-- Stackr -->
  <text
    x="600"
    y="345"
    text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-size="112"
    font-weight="800"
    letter-spacing="-0.03em"
    fill="#f4f4f5"
  >Stack<tspan fill="#2563eb">r</tspan></text>

  <!-- Subtitle -->
  <text
    x="600"
    y="415"
    text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-size="32"
    font-weight="500"
    fill="#9b9ba3"
  >Crypto Portfolio Tracker</text>

  <!-- Tagline -->
  <text
    x="600"
    y="468"
    text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-size="24"
    font-weight="400"
    fill="#71717a"
  >Track every coin. Know your real P&amp;L.</text>

  <!-- URL -->
  <text
    x="600"
    y="570"
    text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-size="20"
    font-weight="400"
    letter-spacing="0.04em"
    fill="#3f3f46"
  >stackr.joseparra.dev</text>
</svg>
