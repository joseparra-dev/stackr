<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Stackr Crypto Portfolio Tracker">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0b" />
      <stop offset="100%" stop-color="#131316" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a2a30" stroke-width="1" opacity="0.35" />
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#grid)" />

  <g transform="translate(520 235) scale(3.5)">
    <rect x="5" y="19" width="14" height="4" rx="1.2" fill="#1d4ed8" />
    <rect x="8" y="14" width="14" height="4" rx="1.2" fill="#2563eb" />
    <rect x="11" y="9" width="14" height="4" rx="1.2" fill="#3b82f6" />
  </g>

  <text
    x="600"
    y="340"
    text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-size="72"
    font-weight="800"
    letter-spacing="-0.03em"
    fill="#f4f4f5"
  >
    Stack<tspan fill="#2563eb">r</tspan>
  </text>

  <text
    x="600"
    y="400"
    text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-size="28"
    font-weight="500"
    fill="#9b9ba3"
  >
    Crypto Portfolio Tracker
  </text>

  <text
    x="600"
    y="450"
    text-anchor="middle"
    font-family="Inter, ui-sans-serif, system-ui, sans-serif"
    font-size="20"
    font-weight="400"
    fill="#71717a"
  >
    Track every coin. Know your real P&amp;L.
  </text>
</svg>
