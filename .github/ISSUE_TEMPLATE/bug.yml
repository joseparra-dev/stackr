name: Bug Report
description: Something broken or unexpected.
title: "fix: "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happens
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What should happen
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "Browser, OS, deploy URL"
