name: Feature / User Story
description: New user-facing feature or HU.
title: "feat: "
labels: ["feature"]
body:
  - type: textarea
    id: story
    attributes:
      label: User Story
      placeholder: "As a [user], I want to [action], so that [benefit]."
    validations:
      required: true
  - type: textarea
    id: ac
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Technical Notes
  - type: textarea
    id: out
    attributes:
      label: Out of Scope
