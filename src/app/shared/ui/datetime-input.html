<div class="w-full">
  <button
    #trigger="cdkOverlayOrigin"
    type="button"
    cdkOverlayOrigin
    class="focus-visible:outline-brand-500 flex w-full cursor-pointer items-center justify-between gap-3 rounded-lg border bg-(--color-surface) px-3 py-2.5 text-left text-sm focus-visible:outline-2 focus-visible:outline-offset-2 disabled:cursor-not-allowed disabled:opacity-60"
    [class.border-danger]="invalid()"
    [class.border-(--color-border)]="!invalid()"
    [class.text-(--color-text)]="displayValue()"
    [class.text-(--color-text-muted)]="!displayValue()"
    [disabled]="isDisabled()"
    [attr.aria-expanded]="isPanelOpen()"
    aria-haspopup="dialog"
    (click)="togglePanel()"
  >
    <span class="truncate">{{ displayValue() || placeholder() }}</span>
    <svg
      lucideCalendar
      [size]="16"
      class="shrink-0 text-(--color-text-muted)"
      aria-hidden="true"
    ></svg>
  </button>

  <ng-template
    cdkConnectedOverlay
    [cdkConnectedOverlayOrigin]="trigger"
    [cdkConnectedOverlayOpen]="isPanelOpen()"
    [cdkConnectedOverlayPositions]="overlayPositions"
    [cdkConnectedOverlayScrollStrategy]="scrollStrategy"
    (overlayOutsideClick)="closePanel()"
    (detach)="closePanel()"
  >
    <div
      #panel
      role="dialog"
      aria-label="Choose date and time"
      class="stackr-datetime-panel w-70 rounded-xl border border-(--color-border) bg-(--color-surface) p-3 shadow-lg"
      tabindex="-1"
      (keydown.escape)="closePanel()"
    >
      <div class="mb-2 flex items-center justify-between gap-2">
        <button
          type="button"
          aria-label="Previous month"
          class="focus-visible:outline-brand-500 inline-flex cursor-pointer rounded-md p-1 text-(--color-text-muted) hover:bg-(--color-surface-2) hover:text-(--color-text) focus-visible:outline-2 focus-visible:outline-offset-2"
          (click)="previousMonth()"
        >
          <svg lucideChevronLeft [size]="14" aria-hidden="true"></svg>
        </button>
        <span class="text-xs font-medium text-(--color-text)">{{ monthTitle() }}</span>
        <button
          type="button"
          aria-label="Next month"
          class="focus-visible:outline-brand-500 inline-flex cursor-pointer rounded-md p-1 text-(--color-text-muted) hover:bg-(--color-surface-2) hover:text-(--color-text) focus-visible:outline-2 focus-visible:outline-offset-2"
          (click)="nextMonth()"
        >
          <svg lucideChevronRight [size]="14" aria-hidden="true"></svg>
        </button>
      </div>

      <div class="mb-1 grid grid-cols-7 gap-0.5">
        @for (weekday of weekdays; track weekday) {
        <span class="py-0.5 text-center text-[10px] font-medium text-(--color-text-muted)"
          >{{ weekday }}</span
        >
        }
      </div>

      <div class="grid grid-cols-7 gap-0.5">
        @for (day of calendarDays(); track day.date.toISOString()) {
        <button
          type="button"
          [disabled]="day.disabled"
          [class]="dayButtonClass(day)"
          (click)="selectDay(day)"
        >
          {{ day.date.getDate() }}
        </button>
        }
      </div>

      <div class="mt-3 grid grid-cols-2 gap-2">
        <select
          aria-label="Hour"
          class="stackr-select focus-visible:outline-brand-500 cursor-pointer rounded-lg border border-(--color-border) bg-(--color-surface) px-2 py-1.5 text-xs text-(--color-text) focus-visible:outline-2 focus-visible:outline-offset-2"
          [value]="selectedHour()"
          (change)="setHour($event)"
        >
          @for (hour of hours; track hour) {
          <option [value]="hour">{{ hour }}</option>
          }
        </select>
        <select
          aria-label="Minute"
          class="stackr-select focus-visible:outline-brand-500 cursor-pointer rounded-lg border border-(--color-border) bg-(--color-surface) px-2 py-1.5 text-xs text-(--color-text) focus-visible:outline-2 focus-visible:outline-offset-2"
          [value]="selectedMinute()"
          (change)="setMinute($event)"
        >
          @for (minute of minutes; track minute) {
          <option [value]="minute">{{ minute }}</option>
          }
        </select>
      </div>

      <div class="mt-2 flex justify-end">
        <button
          type="button"
          class="text-brand-500 hover:text-brand-600 focus-visible:outline-brand-500 cursor-pointer text-xs font-medium focus-visible:outline-2 focus-visible:outline-offset-2"
          (click)="setToday()"
        >
          Today
        </button>
      </div>
    </div>
  </ng-template>
</div>
