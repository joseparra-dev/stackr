<div class="mx-auto flex max-w-5xl flex-col gap-6">
  <div>
    <h1 class="text-xl font-semibold text-(--color-text)">{{ 'holdings.heading' | translate }}</h1>
    <p class="mt-1 text-sm text-(--color-text-muted)">{{ 'holdings.subtitle' | translate }}</p>
  </div>

  @if (loading()) {
  <app-skeleton variant="table" [rows]="3" />
  } @else if (error(); as err) {
  <app-error-state [error]="err" (retry)="retryLoad()" />
  } @else if (!hasHoldings()) {
  <app-empty-state
    headingId="holdings-empty-heading"
    [title]="'holdings.empty.title' | translate"
    [message]="'holdings.empty.message' | translate"
    icon="wallet"
    variant="dashed"
  />
  } @else {
  <app-holdings-table
    [holdings]="sortedHoldings()"
    [sortKey]="tableSortKey()"
    [sortDirection]="tableSortDirection()"
    (sortChange)="onSortChange($event)"
    (rowSelect)="onHoldingSelect($event)"
  />
  }
</div>
