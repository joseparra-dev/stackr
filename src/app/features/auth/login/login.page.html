<main
  class="mx-auto flex min-h-dvh w-full max-w-sm flex-col items-center justify-center gap-6 px-4 py-12"
>
  <article
    role="region"
    aria-labelledby="login-title"
    class="w-full rounded-2xl border border-(--color-border) bg-(--color-surface) p-8 shadow-lg"
  >
    <header class="mb-6 text-center">
      <img
        src="/logo-icon.svg"
        alt=""
        width="40"
        height="40"
        aria-hidden="true"
        class="mx-auto size-10"
      />
      <h1 id="login-title" class="mt-3 text-3xl font-bold tracking-tight">
        Stack<span class="text-brand-600">r</span>
      </h1>
      <p class="mt-2 text-sm text-(--color-text-muted)">
        Track every coin. Know your real P&amp;L.
      </p>
    </header>

    @if (auth.error(); as e) {
    <div
      role="alert"
      aria-live="polite"
      class="border-danger/30 bg-danger/10 text-danger mb-4 rounded-lg border px-4 py-3 text-sm"
    >
      {{ errorMessage(e.code) }}
    </div>
    }

    <button
      type="button"
      [disabled]="auth.loading() || auth.isAuthenticated()"
      [attr.aria-busy]="auth.loading() ? 'true' : null"
      (click)="signIn()"
      class="bg-brand-600 hover:bg-brand-700 focus-visible:outline-brand-500 flex w-full cursor-pointer items-center justify-center gap-3 rounded-lg px-4 py-2.5 text-sm font-medium text-white focus-visible:outline-2 focus-visible:outline-offset-2 disabled:cursor-not-allowed disabled:opacity-60"
    >
      @if (auth.loading()) {
      <span
        aria-hidden="true"
        class="inline-block size-4 animate-spin rounded-full border-2 border-white/40 border-t-white"
      ></span>
      <span>Signing in…</span>
      } @else {
      <img
        src="/assets/svg/logo-google.svg"
        alt="Google"
        width="20"
        height="20"
        aria-hidden="true"
      />
      <span>Sign in with Google</span>
      }
    </button>
  </article>
</main>
