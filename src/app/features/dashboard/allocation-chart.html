<section
  class="rounded-xl border border-(--color-border) bg-(--color-surface) p-5"
  aria-labelledby="allocation-heading"
>
  <h2 id="allocation-heading" class="text-sm font-medium text-(--color-text-muted)">Allocation</h2>

  @if (slices().length === 0) {
  <p class="mt-4 text-sm text-(--color-text-muted)">Allocation appears once assets have a live price.</p>
  } @else {
  <div class="mt-4" role="img" [attr.aria-label]="ariaSummary()">
    <apx-chart
      [series]="series()"
      [chart]="chart()"
      [labels]="labels()"
      [colors]="colors"
      [legend]="legend()"
      [dataLabels]="dataLabels"
      [stroke]="stroke()"
      [plotOptions]="plotOptions()"
      [tooltip]="tooltip()"
      [theme]="apexTheme()"
    />
  </div>

  <ul class="sr-only">
    @for (slice of slices(); track slice.assetId) {
    <li>
      {{ slice.name }} ({{ slice.symbol }}): {{ formatUsd(slice.valueUsd) }},
      {{ formatAllocationPercent(slice.percent) }} of portfolio
    </li>
    }
  </ul>
  }
</section>
