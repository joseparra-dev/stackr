<section
  class="rounded-xl border border-(--color-border) bg-(--color-surface) p-5"
  aria-labelledby="allocation-heading"
>
  <h2 id="allocation-heading" class="text-sm font-medium text-(--color-text-muted)">
    {{ 'dashboard.allocation.heading' | translate }}
  </h2>

  @if (slices().length === 0) {
  <app-empty-state
    headingId="allocation-empty-heading"
    [title]="'dashboard.allocation.emptyTitle' | translate"
    [message]="'dashboard.allocation.emptyMessage' | translate"
    icon="pie-chart"
    variant="compact"
  />
  } @else {
  <div class="mt-4" role="img" [attr.aria-label]="ariaSummary()">
    <apx-chart
      [series]="series()"
      [chart]="chart()"
      [labels]="labels()"
      [colors]="colors"
      [legend]="legend()"
      [dataLabels]="dataLabels"
      [stroke]="stroke()"
      [plotOptions]="plotOptions()"
      [tooltip]="tooltip()"
      [theme]="apexTheme()"
    />
  </div>

  <ul class="sr-only">
    @for (slice of slices(); track slice.assetId) {
    <li>{{ sliceAriaText(slice) }}</li>
    }
  </ul>
  }
</section>
