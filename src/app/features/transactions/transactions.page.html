<div class="mx-auto flex max-w-4xl flex-col gap-6">
  <div class="flex flex-wrap items-center justify-between gap-4">
    <div>
      <h1 class="text-xl font-semibold text-(--color-text)">Transactions</h1>
      <p class="mt-1 text-sm text-(--color-text-muted)">Buy and sell history for your portfolio.</p>
    </div>
    <button
      type="button"
      (click)="openCreateDialog()"
      class="bg-brand-600 hover:bg-brand-700 focus-visible:outline-brand-500 inline-flex cursor-pointer items-center gap-2 rounded-lg px-4 py-2.5 text-sm font-medium text-white focus-visible:outline-2 focus-visible:outline-offset-2"
    >
      <svg lucidePlus [size]="16" aria-hidden="true"></svg>
      Add transaction
    </button>
  </div>

  @if (loading()) {
  <div
    class="rounded-xl border border-(--color-border) bg-(--color-surface) p-6"
    role="status"
    aria-live="polite"
    aria-busy="true"
  >
    <div class="flex flex-col gap-3">
      @for (row of [1, 2, 3]; track row) {
      <div class="h-10 animate-pulse rounded-lg bg-(--color-surface-2)"></div>
      }
    </div>
  </div>
  } @else if (error(); as err) {
  <div
    role="alert"
    class="border-danger/30 bg-danger/10 text-danger rounded-lg border px-4 py-3 text-sm"
  >
    {{ errorMessage(err.code) }}
  </div>
  } @else if (!hasTransactions()) {
  <app-empty-state
    headingId="transactions-empty-heading"
    title="No transactions yet"
    message="Add your first buy or sell to start tracking holdings and P&amp;L."
    icon="arrow-left-right"
    variant="dashed"
    ctaLabel="Add your first transaction"
    ctaLeadingIcon="plus"
    (ctaClick)="openCreateDialog()"
  />
  } @else {
  <app-transaction-filter-bar
    [filters]="filters()"
    [assetOptions]="assetOptions()"
    [showClear]="hasActiveFilters()"
    (filtersChange)="onFiltersChange($event)"
    (clearFilters)="clearFilters()"
  />

  @if (hasActiveFilters() && !hasFilteredTransactions()) {
  <app-empty-state
    headingId="transactions-filtered-empty-heading"
    title="No matching transactions"
    [message]="'Nothing matches your current filters (' + filtersDescription() + ').'"
    icon="filter-x"
    variant="bordered"
    live="polite"
    ctaLabel="Clear filters"
    ctaVariant="link"
    (ctaClick)="clearFilters()"
  />
  } @else {
  <app-transaction-list
    [transactions]="transactions()"
    (edit)="openEditDialog($event)"
    (delete)="confirmDelete($event)"
  />
  }
  }
</div>
