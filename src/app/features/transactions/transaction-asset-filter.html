<div class="relative min-w-0 flex-1">
  <label class="sr-only" for="transaction-asset-filter-search">
    {{ 'transactions.assetFilter.searchAria' | translate }}
  </label>
  <button
    type="button"
    id="transaction-asset-filter-search"
    class="stackr-select flex w-full min-w-[12rem] cursor-pointer items-center justify-between rounded-lg border border-(--color-border) bg-(--color-surface) px-3 py-2.5 text-left text-sm text-(--color-text)"
    [attr.aria-expanded]="panelOpen()"
    aria-controls="transaction-asset-filter-panel"
    (click)="togglePanel()"
  >
    <span class="truncate">{{ triggerLabel() }}</span>
    <span aria-hidden="true" class="text-(--color-text-muted)">▾</span>
  </button>

  @if (panelOpen()) {
  <div
    id="transaction-asset-filter-panel"
    class="absolute z-50 mt-1 w-full min-w-[16rem] rounded-xl border border-(--color-border) bg-(--color-surface) p-3 shadow-lg"
    role="group"
    [attr.aria-label]="'transactions.assetFilter.panelAria' | translate"
  >
    <input
      type="search"
      class="focus-visible:outline-brand-500 w-full rounded-lg border border-(--color-border) bg-(--color-surface-2) px-3 py-2 text-sm text-(--color-text) placeholder:text-(--color-text-muted) focus-visible:outline-2 focus-visible:outline-offset-2"
      [placeholder]="'transactions.assetFilter.searchPlaceholder' | translate"
      [value]="searchQuery()"
      (input)="onSearchInput($event)"
    />

    <ul class="mt-2 max-h-48 overflow-auto" role="listbox" aria-multiselectable="true">
      @for (asset of filteredOptions(); track asset.id) {
      <li role="presentation">
        <label
          class="flex cursor-pointer items-center gap-3 rounded-lg px-2 py-2 hover:bg-(--color-surface-2)"
        >
          <input
            type="checkbox"
            class="size-4 accent-(--color-brand-500)"
            [checked]="isSelected(asset.id)"
            (change)="toggleAsset(asset.id)"
          />
          @if (asset.thumbUrl) {
          <img
            [src]="asset.thumbUrl"
            [alt]=""
            width="24"
            height="24"
            class="size-6 shrink-0 rounded-full bg-(--color-surface-2) object-cover"
          />
          }
          <span class="min-w-0 flex-1 truncate text-sm text-(--color-text)">{{ asset.name }}</span>
          <span class="shrink-0 text-xs font-semibold text-(--color-text-muted)">{{
            asset.symbol
          }}</span>
        </label>
      </li>
      } @empty {
      <li class="px-2 py-2 text-sm text-(--color-text-muted)" role="status">
        {{ 'transactions.assetFilter.noResults' | translate }}
      </li>
      }
    </ul>
  </div>
  }
</div>
