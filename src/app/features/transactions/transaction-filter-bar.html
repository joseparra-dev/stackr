<section
  class="rounded-xl border border-(--color-border) bg-(--color-surface) p-4"
  aria-label="Transaction filters"
>
  <div class="flex flex-col gap-4 lg:flex-row lg:flex-wrap lg:items-end">
    <app-transaction-asset-filter
      class="w-full lg:max-w-xs"
      [options]="assetOptions()"
      [selectedIds]="filters().assetIds"
      (selectedIdsChange)="onAssetIdsChange($event)"
    />

    <div class="flex min-w-[8rem] flex-col gap-1">
      <label class="text-xs font-medium text-(--color-text-muted)" for="transaction-type-filter"
        >Type</label
      >
      <select
        id="transaction-type-filter"
        class="stackr-select w-full rounded-lg border border-(--color-border) bg-(--color-surface) px-3 py-2.5 text-sm text-(--color-text)"
        [value]="filters().type"
        (change)="onTypeChange($event)"
      >
        @for (option of typeOptions; track option.value) {
        <option [value]="option.value">{{ option.label }}</option>
        }
      </select>
    </div>

    <div class="flex min-w-[9rem] flex-col gap-1">
      <label class="text-xs font-medium text-(--color-text-muted)" for="transaction-from-filter"
        >From</label
      >
      <input
        id="transaction-from-filter"
        type="date"
        class="w-full rounded-lg border border-(--color-border) bg-(--color-surface) px-3 py-2.5 text-sm text-(--color-text)"
        [value]="filters().fromDate ?? ''"
        (change)="onFromDateChange($event)"
      />
    </div>

    <div class="flex min-w-[9rem] flex-col gap-1">
      <label class="text-xs font-medium text-(--color-text-muted)" for="transaction-to-filter"
        >To</label
      >
      <input
        id="transaction-to-filter"
        type="date"
        class="w-full rounded-lg border border-(--color-border) bg-(--color-surface) px-3 py-2.5 text-sm text-(--color-text)"
        [value]="filters().toDate ?? ''"
        (change)="onToDateChange($event)"
      />
    </div>

    @if (showClear()) {
    <button
      type="button"
      class="text-brand-600 hover:text-brand-700 cursor-pointer self-end px-1 py-2.5 text-sm font-medium"
      (click)="clearFilters.emit()"
    >
      Clear filters
    </button>
    }
  </div>
</section>
