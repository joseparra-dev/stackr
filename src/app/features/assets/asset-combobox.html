<div class="relative w-full max-w-md">
  <label class="sr-only" for="asset-combobox-input">Search asset</label>
  <div class="relative">
    <input
      #queryInput
      id="asset-combobox-input"
      type="text"
      role="combobox"
      autocomplete="off"
      class="focus-visible:outline-brand-500 w-full rounded-lg border border-(--color-border) bg-(--color-surface) px-3 py-2.5 pr-10 text-sm text-(--color-text) placeholder:text-(--color-text-muted) focus-visible:outline-2 focus-visible:outline-offset-2 disabled:cursor-not-allowed disabled:opacity-60"
      [value]="searchQuery()"
      [placeholder]="placeholder()"
      [disabled]="isDisabled()"
      [attr.aria-expanded]="panelOpen()"
      [attr.aria-busy]="loading() ? 'true' : null"
      [attr.aria-activedescendant]="activeOptionId()"
      aria-controls="asset-combobox-listbox"
      aria-autocomplete="list"
      (input)="onQueryInput($event)"
      (focus)="onInputFocus()"
      (blur)="onInputBlur()"
      (keydown)="onKeyDown($event)"
    />

    @if (loading()) {
    <span
      aria-hidden="true"
      class="border-t-brand-500 pointer-events-none absolute top-1/2 right-3 inline-block size-4 -translate-y-1/2 animate-spin rounded-full border-2 border-(--color-border)"
    ></span>
    }
  </div>

  @if (panelOpen()) {
  <ul
    id="asset-combobox-listbox"
    role="listbox"
    class="absolute z-50 mt-1 max-h-72 w-full overflow-auto rounded-xl border border-(--color-border) bg-(--color-surface) py-1 shadow-lg"
  >
    @if (error(); as err) {
    <li class="text-danger px-3 py-2.5 text-sm" role="status">{{ errorMessage(err.code) }}</li>
    } @else if (searched() && results().length === 0) {
    <li class="px-3 py-2.5 text-sm text-(--color-text-muted)" role="status">No assets found</li>
    } @else { @for (result of results(); track result.id; let i = $index) {
    <li role="presentation">
      <button
        type="button"
        role="option"
        [id]="optionId(result.id)"
        [attr.aria-selected]="i === activeIndex()"
        [class.bg-(--color-surface-2)]="i === activeIndex()"
        class="flex w-full cursor-pointer items-center gap-3 px-3 py-2.5 text-left text-sm hover:bg-(--color-surface-2)"
        (mousedown)="preventBlur($event)"
        (mouseenter)="highlight(i)"
        (click)="selectAsset(result)"
      >
        <img
          [src]="result.thumbUrl"
          alt=""
          width="24"
          height="24"
          class="size-6 shrink-0 rounded-full bg-(--color-surface-2) object-cover"
        />
        <span class="min-w-0 flex-1 truncate font-medium text-(--color-text)"
          >{{ result.name }}</span
        >
        <span class="shrink-0 text-xs font-semibold text-(--color-text-muted)"
          >{{ result.symbol }}</span
        >
        @if (result.marketCapRank; as rank) {
        <span class="shrink-0 text-xs text-(--color-text-muted)">#{{ rank }}</span>
        }
      </button>
    </li>
    } }
  </ul>
  }
</div>
