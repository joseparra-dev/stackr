      property="og:description"
      content="A treasury-grade personal portfolio tracker for crypto investors."

    <meta property="og:image" content="https://stackr.joseparra.dev/og-image.png" />
    <meta property="og:image:secure_url" content="https://stackr.joseparra.dev/og-image.png" />

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <script>
      (function () {
        try {
          var stored = localStorage.getItem('stackr:theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme =
            stored === 'system' || !stored
              ? prefersDark
                ? 'dark'
                : 'light'
              : stored === 'dark'
                ? 'dark'
                : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
